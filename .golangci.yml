version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - bodyclose
    - goconst
    - misspell
    - unconvert
  settings:
    govet:
      enable-all: true
      disable:
        - fieldalignment
    goconst:
      min-len: 3
      min-occurrences: 3
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - goconst
          - bodyclose
