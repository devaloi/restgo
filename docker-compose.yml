services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=restgo
      - DB_PASS=restgo
      - DB_NAME=restgo
      - DB_SSLMODE=disable
      - JWT_SECRET=change-me-in-production
      - SERVER_PORT=8080
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: restgo
      POSTGRES_PASSWORD: restgo
      POSTGRES_DB: restgo
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U restgo"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
